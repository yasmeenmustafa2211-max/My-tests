            {txt:"مَدٌّ بِالْيَاء (ـي)", opts:["عُودٌ","نُورٌ","طَبِيبٌ"], ans:2}, {txt:"مَدٌّ بِالْوَاو (ـو)", opts:["صُوفٌ","طَائِرَةٌ","فِيلٌ"], ans:0},
            {txt:"مَدٌّ بِالأَلِف (ـا)", opts:["طِينٌ","غُرَابٌ","دُبٌّ"], ans:1}, {txt:"مَدٌّ بِالْيَاء (ـي)", opts:["مَوْزٌ","دِيكٌ","صُورَةٌ"], ans:1},
            {txt:"مَدٌّ بِالْوَاو (ـو)", opts:["تَاجٌ","خَوْخٌ","نُجُومٌ"], ans:2}, {txt:"مَدٌّ بِالأَلِف (ـا)", opts:["تُفَّاحٌ","تِينٌ","ثُومٌ"], ans:0},
            {txt:"مَدٌّ بِالْيَاء (ـي)", opts:["مِفْتَاحٌ","عَصِيرٌ","شُبَّاكٌ"], ans:1}, {txt:"مَدٌّ بِالْوَاو (ـو)", opts:["صُنْدُوقٌ","سَاعَةٌ","قَمَرٌ"], ans:0},

// تسطيح المصفوفة ليكون كل سؤال في صفحة
const flatQuestions = [];
sectionsData.forEach(sec => {
    sec.qs.forEach(q => {
        flatQuestions.push({
            secTitle: sec.title, bg: sec.bg, type: sec.type, ...q
        });
    });
});

let score = 0;
const container = document.getElementById('quiz-container');

function renderQuiz() {
    container.innerHTML = "";
    
    flatQuestions.forEach((q, index) => {
        const pageDiv = document.createElement('div');
        pageDiv.className = `page ${index === 0 ? 'active-page' : ''}`;
        pageDiv.id = `page-${index}`;
        pageDiv.style.backgroundColor = q.bg;

        let contentHTML = `<div class="q-counter">السُّؤَال: ${index + 1} مِنْ ${flatQuestions.length}</div>`;
        contentHTML += `<div class="question-title">${q.secTitle}</div>`;

        // بناء المحتوى بناءً على نوع السؤال
        if (q.type === 'image' || q.type === 'true_false') {
            contentHTML += `<div class="question-image">${q.img}</div>`;
            if(q.txt) contentHTML += `<div class="question-text">${q.txt}</div>`;
        } 
        else if (q.type === 'audio_word' || q.type === 'audio_sent') {
            contentHTML += `<button class="btn-audio" onclick="playAudio('${q.audio}')">🔊 اسْتَمِعِي بِالتَّرْكِيز</button>`;
        } 
        else if (q.type === 'text') {
            contentHTML += `<div class="question-text">${q.txt}</div>`;
        }
        else if (q.type === 'spelling') {
             // لا يحتاج نص إضافي، العنوان يكفي
        }

        // الخيارات
        contentHTML += `<div class="options-grid" id="options-${index}">`;
        q.opts.forEach((opt, optIndex) => {
            contentHTML += `<div class="option" onclick="checkAnswer(${index}, ${optIndex}, this)">${opt}</div>`;
        });
        contentHTML += `</div>`;

        // أزرار التنقل
        contentHTML += `<div class="nav-buttons">
            <button class="nav-btn" onclick="prevPage(${index})" ${index === 0 ? 'style="visibility:hidden;"' : ''}>قَبْل</button>
            <button class="nav-btn" id="next-btn-${index}" onclick="nextPage(${index})" disabled>بَعْد</button>
        </div>`;

        pageDiv.innerHTML = contentHTML;
        container.appendChild(pageDiv);
    });

    // صفحة النتيجة النهائية
    const resultPage = document.createElement('div');
    resultPage.className = 'page';
    resultPage.id = `page-${flatQuestions.length}`;
    resultPage.style.backgroundColor = "#FFFFF0";
    resultPage.innerHTML = `
        <div class="result-screen">
            <div class="stars">⭐⭐🌟⭐⭐</div>
            <div class="question-title" id="final-text" style="font-size:38px; color:#2c3e50;"></div>
        </div>
    `;
    container.appendChild(resultPage);
}

function checkAnswer(qIndex, optIndex, selectedElement) {
    const q = flatQuestions[qIndex];
    if (q.answered) return; 
    q.answered = true;

    const optionsContainer = document.getElementById(`options-${qIndex}`);
    const allOptions = optionsContainer.children;

    for(let i=0; i<allOptions.length; i++) {
        allOptions[i].classList.add('disabled');
    }

    if (optIndex === q.ans) {
        selectedElement.classList.add('correct');
        score++;
    } else {
        selectedElement.classList.add('wrong');
        allOptions[q.ans].classList.add('correct');
    }

    document.getElementById(`next-btn-${qIndex}`).disabled = false;
}

function nextPage(currentIndex) {
    document.getElementById(`page-${currentIndex}`).classList.remove('active-page');
    document.getElementById(`page-${currentIndex + 1}`).classList.add('active-page');
    if(currentIndex + 1 === flatQuestions.length) { showResult(); }
}

function prevPage(currentIndex) {
    document.getElementById(`page-${currentIndex}`).classList.remove('active-page');
    document.getElementById(`page-${currentIndex - 1}`).classList.add('active-page');
}

function showResult() {
    const resultText = `اكتمل الاختبار! الدرجة: ${score} / ${flatQuestions.length}. أحسنتِ إتمام الاختبار التجريبي.`;
    document.getElementById('final-text').innerText = resultText;
}

function playAudio(text) {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ar-SA';
        utterance.rate = 0.8;
        window.speechSynthesis.speak(utterance);
    } else {
        alert("عذراً، المتصفح لا يدعم ميزة الصوت.");
    }
}

renderQuiz();
</script>
