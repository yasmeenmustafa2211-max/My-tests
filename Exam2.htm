<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اخْتِبَارُ تَحْدِيدِ الْمُسْتَوَى - الْمُبْتَدِئُ الثَّانِي</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #2563eb;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --correct-bg: #dcfce7;
            --correct-border: #22c55e;
            --wrong-bg: #fef08a;
            --wrong-border: #eab308;
            --text-color: #1f2937;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 20px;
            font-size: 18px;
        }
        .container {
            max-width: 950px;
            margin: auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 { color: var(--primary); text-align: center; border-bottom: 3px solid var(--secondary); padding-bottom: 15px; }
        h2 { color: var(--secondary); margin-top: 0; }
        
        .page { display: none; animation: fadeIn 0.4s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-desc { font-weight: bold; margin-bottom: 20px; color: #4b5563; background: #e5e7eb; padding: 15px; border-radius: 8px;}
        .story-box { background: #e0f2fe; padding: 20px; border-radius: 8px; margin-bottom: 25px; line-height: 2.2; font-size: 20px; text-align: justify; border-right: 5px solid var(--secondary);}
        
        .q-block { margin-bottom: 20px; padding: 15px; border-radius: 8px; background: #fff; border: 2px solid #e5e7eb; }
        .q-text { font-weight: bold; margin-bottom: 12px; color: var(--primary); }
        
        /* تصميم خيارات الإجابة */
        .options label { 
            display: block; margin-bottom: 8px; cursor: pointer; padding: 10px; 
            border-radius: 5px; transition: 0.2s; background: #f9fafb; border: 1px solid #d1d5db;
        }
        .options label:hover { background-color: #f3f4f6; }
        
        /* كلاسات التظليل للإجابات (تُطبق على الخيار نفسه وليس الصندوق) */
        label.correct-ans, select.correct-ans, input.correct-ans { 
            background-color: var(--correct-bg) !important; 
            border-color: var(--correct-border) !important; 
            color: #15803d !important;
            font-weight: bold;
        }
        label.wrong-ans, select.wrong-ans, input.wrong-ans { 
            background-color: var(--wrong-bg) !important; 
            border-color: var(--wrong-border) !important; 
            color: #a16207 !important;
            font-weight: bold;
        }

        .feedback { margin-top: 10px; padding: 10px; background-color: #f3f4f6; border-right: 4px solid var(--primary); font-weight: bold; color: #b91c1c; border-radius: 4px; display: none; }

        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 20px; background: #fef9c3; border-radius: 8px; justify-content: center; font-weight: bold; border: 1px dashed #ca8a04;}
        .word-chip { background: #fff; padding: 8px 18px; border-radius: 20px; border: 1px solid #eab308; color: #854d0e; }
        
        select, input[type="text"] { padding: 10px; font-size: 16px; font-family: inherit; border-radius: 6px; border: 1px solid #9ca3af; width: 100%; box-sizing: border-box; outline: none; transition: 0.3s;}
        select { width: auto; display: inline-block; margin: 0 10px; font-weight: bold; color: var(--secondary);}
        .btn-check { margin-top:10px; padding: 8px 15px; border-radius: 5px; background: var(--secondary); color: white; border: none; cursor: pointer; font-weight:bold;}

        .nav-area { display: flex; justify-content: space-between; margin-top: 30px; border-top: 2px solid #e5e7eb; padding-top: 20px; }
        .btn-nav { padding: 12px 30px; font-size: 18px; font-weight: bold; color: #fff; background-color: var(--secondary); border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-nav:hover { background-color: var(--primary); }
        .btn-submit { background-color: #16a34a; display: none; }
        .btn-submit:hover { background-color: #15803d; }
        
        .page-ind { text-align: center; font-weight: bold; margin-bottom: 20px; color: #6b7280; font-size: 16px;}
        #result-box { display: none; margin-top: 30px; padding: 30px; text-align: center; background: var(--primary); color: #fff; border-radius: 12px; font-size: 26px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
        .visual-desc { font-style: italic; color: #4b5563; background: #f3f4f6; padding: 10px; border-right: 4px solid #9ca3af; margin-bottom: 15px;}
        .note { color: #dc2626; font-size: 15px; font-weight: bold; text-align: center; margin-bottom: 15px; display:block;}
    </style>
</head>

<div class="container">
    <h1>اخْتِبَارُ تَحْدِيدِ الْمُسْتَوَى (الْمُبْتَدِئُ الثَّانِي)</h1>

</div>

        <h2>الْقِسْمُ 8: اِخْتَارِي الْجَمْعَ الْمُنَاسِبَ لِكُلِّ كَلِمَةٍ مُفْرَدَةٍ (15 نُقْطَةً)</h2>`;
    s8_data.forEach((qObj, i) => { html += renderMCQBlock(qObj, `s8_${i}`, false); });
    html += `</div>`;

    // Page 9
    html += `<div class="page" id="page-8">
        <h2>الْقِسْمُ 9: اِخْتَارِي الْمُضَادَّ (الْعَكْسَ) الْمُنَاسِبَ لِلْكَلِمَةِ (15 نُقْطَةً)</h2>`;
    s9_data.forEach((qObj, i) => { html += renderMCQBlock(qObj, `s9_${i}`, false); });
    html += `</div>`;

    // Page 10
    html += `<div class="page" id="page-9">
        <h2>الْقِسْمُ 10: تَصْرِيفُ الْأَفْعَالِ (10 نِقَاطٍ)</h2>
        <div class="section-desc">اِخْتَارِي التَّصْرِيفَ الصَّحِيحَ لِلْفِعْلِ بَيْنَ الْقَوْسَيْنِ لِيُنَاسِبَ الْجُمْلَةَ:</div>`;
    s10_data.forEach((qObj, i) => { html += renderMCQBlock(qObj, `s10_${i}`, false); });
    html += `</div>`;

    // Page 11 (القسم المعدل)
    html += `<div class="page" id="page-10">
        <h2>الْقِسْمُ 11: أَسْئِلَةُ التَّخَيُّلِ وَالْوَصْفِ (15 نُقْطَةً)</h2>
        <div class="section-desc">تَخَيَّلِي الْمَشَاهِدَ التَّالِيَةَ جَيِّداً، ثُمَّ أَجِيبِي عَنِ السُّؤَالِ:</div>`;
    s11_data.forEach((qObj, i) => {
        let combQ = { q: `${i+1}. <div class="visual-desc">${qObj.desc}</div> ${qObj.q}`, o: qObj.o, a: qObj.a };
        html += renderMCQBlock(combQ, `s11_${i}`, false);
    });
    html += `</div>`;

    // Page 12
    html += `<div class="page" id="page-11">
        <h2>الْقِسْمُ 12: وَظِّفِي الْمُفْرَدَاتِ التَّالِيَةَ فِي جُمَلٍ مُفِيدَةٍ (20 نُقْطَةً)</h2>
        <span class="note">(هَذَا الْقِسْمُ يَتَمُّ تَقْيِيمُهُ مِنْ قِبَلِ الْمُعَلِّمَةِ لَاحِقاً وَلَا يَدْخُلُ فِي حِسَابِ الدَّرَجَةِ الْآلِيَّةِ)</span>`;
    s12_words.forEach((w, i) => {
        html += `<div class="q-block" style="display:flex; align-items:center; gap:15px;">
            <strong style="width:120px; color:var(--primary);">${i+1}. ${w} :</strong>
            <input type="text" placeholder="اكْتُبِي جُمْلَةً مُفِيدَةً...">
        </div>`;
    });
    html += `</div>`;

    container.innerHTML = html;
}

// --- Instant Grading Logic ---

function disableInputsInBlock(blockId) {
    const block = document.getElementById(blockId);
    const inputs = block.querySelectorAll('input, select, button');
    inputs.forEach(inp => inp.disabled = true);
    block.dataset.answered = "true";
}

function showFeedbackText(blockId, text) {
    const fbId = `fb_${blockId.replace('block_', '')}`;
    const fb = document.getElementById(fbId);
    if(fb) {
        fb.innerHTML = `الْجَوَابُ الصَّحِيحُ هُوَ: ${text}`;
        fb.style.display = 'block';
    }
}

function gradeMCQ(blockId, correctVal, inputEl, correctText) {
    const blockIdFull = `block_${blockId}`;
    const block = document.getElementById(blockIdFull);
    if(block.dataset.answered) return;
    
    let isCorrect = false;
    if (typeof correctVal === 'string') {
        isCorrect = (inputEl.value === correctVal);
    } else {
        isCorrect = (parseInt(inputEl.value) === correctVal);
    }

    const selectedLabel = inputEl.closest('label');

    if(isCorrect) {
        selectedLabel.classList.add('correct-ans');
        autoScore++;
    } else {
        // تظليل الخيار الخاطئ
        selectedLabel.classList.add('wrong-ans');
        
        // البحث عن الخيار الصحيح وتظليله تلقائياً
        const allInputs = block.querySelectorAll('input[type="radio"]');
        allInputs.forEach(inp => {
            let isThisCorrect = false;
            if (typeof correctVal === 'string') {
                isThisCorrect = (inp.value === correctVal);
            } else {
                isThisCorrect = (parseInt(inp.value) === correctVal);
            }
            if(isThisCorrect) {
                inp.closest('label').classList.add('correct-ans');
            }
        });
        showFeedbackText(blockIdFull, correctText);
    }
    disableInputsInBlock(blockIdFull);
}

function gradeSelect(blockId, selectEl, correctText) {
    const block = document.getElementById(blockId);
    if(block.dataset.answered) return;
    if(selectEl.value === "") return;

    if(selectEl.value === correctText) {
        selectEl.classList.add('correct-ans');
        autoScore++;
    } else {
        selectEl.classList.add('wrong-ans');
        showFeedbackText(blockId, correctText);
    }
    disableInputsInBlock(blockId);
}

function gradeEssay(blockId, inputId, keywordsArray, correctText) {
    const block = document.getElementById(blockId);
    if(block.dataset.answered) return;

    const inputEl = document.getElementById(inputId);
    const val = inputEl.value.trim();
    if(val === "") {
        alert("الرَّجَاءُ كِتَابَةُ الْإِجَابَةِ أَوَّلاً!");
        return;
    }

    const hasKeyword = keywordsArray.some(kw => val.includes(kw));
    const isLongEnough = val.length > 8; 

    if(hasKeyword || isLongEnough) {
        inputEl.classList.add('correct-ans');
        autoScore++;
    } else {
        inputEl.classList.add('wrong-ans');
        showFeedbackText(blockId, correctText);
    }
    disableInputsInBlock(blockId);
}

// --- Pagination Logic ---
function updatePagination() {
    const pages = document.querySelectorAll('.page');
    pages.forEach((page, index) => {
        if(index === currentPage) page.classList.add('active');
        else page.classList.remove('active');
    });

    document.getElementById('page-ind').innerText = `الصَّفْحَة ${currentPage + 1} مِنْ ${totalPages}`;

    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnSubmit = document.getElementById('btn-submit');

    btnPrev.style.display = (currentPage === 0) ? 'none' : 'inline-block';
    
    if(currentPage === totalPages - 1) {
        btnNext.style.display = 'none';
        btnSubmit.style.display = 'inline-block';
    } else {
        btnNext.style.display = 'inline-block';
        btnSubmit.style.display = 'none';
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function changePage(step) {
    currentPage += step;
    if(currentPage < 0) currentPage = 0;
    if(currentPage >= totalPages) currentPage = totalPages - 1;
    updatePagination();
}

function finishTest() {
    document.getElementById("quiz-container").style.display = "none";
    document.getElementById("page-ind").style.display = "none";
    document.getElementById("nav-area").style.display = "none";
    
    const resBox = document.getElementById("result-box");
    resBox.style.display = "block";
    resBox.innerText = `اكتمل الاختبار! الدرجة: ${autoScore} / ${totalAutoScore}. أحسنتِ إتمام الاختبار التجريبي.`;
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
